<div class="card bg-base-100 w-96 shadow-sm">
    <div class="card-body">
      <figure>
        <img class="w-32 h-60" [src]="image" alt="Shoes" />
      </figure>
      <h2 class="card-title">{{title}}</h2>
      <p>{{description}}</p>
      <p>Price: &#8377;{{price}}</p>
      <div class="card-actions justify-end">
        <button class="btn btn-primary">Get Sticker</button>
      </div>
    </div>
</div>
